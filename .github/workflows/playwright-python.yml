name: Playwright (Python)

on:
  push:
    branches: [master, main]
    paths: ['python/**', '.github/workflows/playwright-python.yml']
  pull_request:
    paths: ['python/**', '.github/workflows/playwright-python.yml']
  workflow_dispatch:

concurrency:
  group: pw-py-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: python

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: python/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Resolve Playwright version
        id: pw
        run: echo "version=$(python -c 'import importlib.metadata as m; print(m.version("playwright"))')" >> "$GITHUB_OUTPUT"
      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-browsers-${{ runner.os }}-py-${{ steps.pw.outputs.version }}
      - name: Install Playwright browsers (cache miss)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: python -m playwright install --with-deps chromium
      - name: Install system deps only (cache hit)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: python -m playwright install-deps chromium
      - name: Lint
        run: ruff check .
      - name: Run tests (parallel)
        run: pytest -n auto --browser chromium
      - name: Upload test artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: python-test-results-${{ matrix.python-version }}
          path: |
            python/test-results/
            python/traces/
          retention-days: 7
          if-no-files-found: ignore
