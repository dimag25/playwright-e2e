name: Validate

# Fast, browser-free gate that runs on every push / PR: static analysis plus a
# "do the specs even compile & wire up correctly?" check. Catches the majority
# of mistakes in seconds without downloading browsers.

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  config-and-skills:
    name: Config & Agent Skills
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Validate .mcp.json and SKILL.md files
        run: node .github/scripts/validate-skills.mjs

  typescript:
    name: TypeScript checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: typescript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: typescript/package-lock.json
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Format check
        run: npm run format:check
      - name: Specs compile & wire up (no browser)
        run: npx playwright test --list

  python:
    name: Python checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: python/requirements.txt
      - run: pip install -r requirements.txt
      - name: Lint
        run: ruff check .
      - name: Tests collect (no browser)
        run: pytest --collect-only -q
